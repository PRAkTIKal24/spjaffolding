name: Run Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest
    if: false  # Temporarily disable CI tests until the package is published

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run pytests
        run: pytest
